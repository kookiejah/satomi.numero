<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&family=Cinzel:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
.mq{background:#0F0D1A;color:#E8DCC0;padding:2rem 1.25rem;border-radius:4px;font-family:'Inter',sans-serif;border:0.5px solid #2A2438;position:relative;overflow:hidden;max-width:380px;width:100%;margin:0 auto;box-sizing:border-box}
.mq-corner{position:absolute;width:36px;height:36px;border:0.5px solid #7A6642;opacity:.5}
.mq-corner.tl{top:14px;left:14px;border-right:none;border-bottom:none}
.mq-corner.tr{top:14px;right:14px;border-left:none;border-bottom:none}
.mq-corner.bl{bottom:14px;left:14px;border-right:none;border-top:none}
.mq-corner.br{bottom:14px;right:14px;border-left:none;border-top:none}
.mq *:not(.mq-corner){position:relative}

.mq-eyebrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem}
.mq-eyebrow-num{font-family:'Cinzel',serif;font-weight:500;font-size:13px;letter-spacing:.1em;color:#C9A961}
.mq-eyebrow-txt{font-family:'Cinzel',serif;font-weight:400;font-size:10px;letter-spacing:.4em;color:#C9A961;padding-left:.5em}
.mq-eyebrow-sep{width:0.5px;height:12px;background:#7A6642}
.mq-orn{text-align:center;color:#7A6642;font-size:14px;margin-bottom:1rem;letter-spacing:.4em}
.mq-h1{font-family:'Cinzel',serif;font-weight:500;font-size:30px;line-height:1;text-align:center;color:#E8DCC0;margin-bottom:.6rem;letter-spacing:.1em;white-space:nowrap}
.mq-sub{font-family:'Cormorant',serif;font-style:italic;font-size:13px;text-align:center;color:#8A7859;margin-bottom:1.5rem;letter-spacing:.05em}

.mq-form{background:#1A1526;border:0.5px solid #2A2438;padding:1rem;border-radius:2px;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center;gap:10px}
.mq-date-label{font-family:'Cormorant',serif;font-style:italic;font-size:14px;color:#8A7859;text-align:center;letter-spacing:.03em}
.mq-date-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;width:100%}
.mq-in{background:transparent;border:none;border-bottom:0.5px solid #C9A961;font-family:'Cormorant',serif;font-size:26px;font-weight:500;color:#E8DCC0;text-align:center;padding:2px 0;outline:none}
.mq-in::placeholder{color:#3A3346}
.mq-in:focus{border-color:#E8DCC0}
.mq-dot{font-family:'Cormorant',serif;font-size:22px;color:#7A6642}
.mq-btn{background:#F5F0E4;color:#0F0D1A;border:0.5px solid #F5F0E4;padding:10px 26px;font-family:'Cinzel',serif;font-weight:500;font-size:11px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%}
.mq-btn:hover{background:#C9A961;border-color:#C9A961;color:#0F0D1A}

.mq-err{color:#E17B7B;font-family:'Cormorant',serif;font-style:italic;font-size:14px;text-align:center;min-height:20px;margin-bottom:.5rem}

.mq-sec{text-align:center;margin-bottom:1.25rem;position:relative}
.mq-sec-t{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.4em;color:#C9A961;display:inline-block;background:#0F0D1A;padding:0 16px;position:relative;z-index:1}
.mq-sec::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:#2A2438;z-index:0}

.mq-mat{background:#1A1526;border:0.5px solid #2A2438;border-radius:2px;overflow:hidden;margin-bottom:1rem}
.mq-mat table{width:100%;border-collapse:collapse;table-layout:fixed}
.mq-mat td{border:0.5px solid #2A2438;padding:12px 4px;text-align:center;vertical-align:middle}
.mq-mat tr:first-child td{border-top:none}
.mq-mat tr:last-child td{border-bottom:none}
.mq-mat td:first-child{border-left:none}
.mq-mat td:last-child{border-right:none}
.mq-lab{font-family:'Cinzel',serif;font-size:8px;color:#7A6642;letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:6px}
.mq-num{font-family:'Cormorant',serif;font-weight:500;font-size:22px;color:#E8DCC0;letter-spacing:2px;display:block;line-height:1}
.mq-empty{font-family:'Cormorant',serif;font-style:italic;font-size:22px;color:#3A3346;display:block;line-height:1}
.mq-full{background:#221B33}
.mq-full .mq-num{color:#E8DCC0}

.mq-dopch{background:#221B33;text-align:left!important;padding:14px 16px!important}
.mq-dopch .mq-num{font-size:15px;letter-spacing:1px;color:#C9A961}
.mq-chs{background:#3D2E1A;border:0.5px solid #C9A961!important}
.mq-chs .mq-lab{color:#C9A961}
.mq-chs .mq-num{color:#F5D98A;font-size:30px;font-weight:600}
.mq-temp{background:#221B33}
.mq-temp .mq-num{color:#C9A961}
.mq-outer{background:#221B33}
.mq-outer .mq-num{color:#C9A961;font-size:20px;letter-spacing:0}
.mq-outer .mq-num small{font-family:'Cormorant',serif;font-size:15px;color:#7A6642;margin-left:3px;letter-spacing:0}
.mq-blank{background:transparent}

.mq-foot{text-align:center;font-family:'Cormorant',serif;font-style:italic;color:#5A4E38;font-size:13px;margin-top:1.5rem;letter-spacing:.05em}
</style>

<div class="mq">
  <div class="mq-corner tl"></div><div class="mq-corner tr"></div>
  <div class="mq-corner bl"></div><div class="mq-corner br"></div>

  <div class="mq-eyebrow">
    <span class="mq-eyebrow-num">15</span>
    <span class="mq-eyebrow-sep"></span>
    <span class="mq-eyebrow-txt">MYSTERIUM</span>
  </div>
  <div class="mq-orn">✦ · · · ✦ · · · ✦</div>
  <div class="mq-h1">SATOMI NUMERO</div>
  <div class="mq-sub">— code of the soul, written at birth —</div>

  <div class="mq-form">
    <div class="mq-date-label">Ваша дата рождения</div>
    <div class="mq-date-row">
      <input id="mqd" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ДД" maxlength="2" style="width:42px">
      <span class="mq-dot">·</span>
      <input id="mqm" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ММ" maxlength="2" style="width:42px">
      <span class="mq-dot">·</span>
      <input id="mqy" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ГГГГ" maxlength="4" style="width:70px">
    </div>
    <button class="mq-btn" onclick="mqCalc()">Раскрыть</button>
  </div>

  <div class="mq-err" id="mqerr"></div>

  <div id="mqout" style="display:none">
    <div class="mq-sec"><span class="mq-sec-t">Quadratum · матрица</span></div>
    <div class="mq-mat"><table id="mqmat"></table></div>
    <div class="mq-foot">✦ ex numeris veritas ✦</div>
  </div>
</div>

<script>
(function(){
  // Подстраховка: если хост-страница вставляет этот код в <body> и своего viewport-тега у неё нет,
  // добавляем его через JS — иначе на телефоне вся страница рендерится уменьшенной.
  if(!document.querySelector('meta[name="viewport"]')){
    const vp=document.createElement('meta');
    vp.name='viewport';
    vp.content='width=device-width, initial-scale=1';
    document.head.appendChild(vp);
  }

  const DN_RU={1:'Характер',2:'Энергия',3:'Интерес',4:'Здоровье',5:'Логика',6:'Труд',7:'Удача',8:'Долг',9:'Память'};
  const digs=n=>Math.abs(n).toString().split('').map(Number);
  const sd=n=>digs(n).reduce((a,b)=>a+b,0);

  function cell(d,cnt){
    const n=cnt[d];
    const val=n===0?null:d.toString().repeat(n);
    const cls=n>0?'mq-full':'';
    return `<td class="${cls}"><span class="mq-lab">${DN_RU[d]}</span>${val?`<span class="mq-num">${val}</span>`:`<span class="mq-empty">✦</span>`}</td>`;
  }

  window.mqCalc=function(){
    const err=document.getElementById('mqerr');err.textContent='';
    const d=+document.getElementById('mqd').value||0;
    const m=+document.getElementById('mqm').value||0;
    const y=+document.getElementById('mqy').value||0;
    if(!d||!m||!y||y<1900||d<1||d>31||m<1||m>12){err.textContent='введите корректную дату';document.getElementById('mqout').style.display='none';return;}

    const dS=d.toString().padStart(2,'0'),mS=m.toString().padStart(2,'0'),yS=y.toString().padStart(4,'0');
    const d1=+dS[0],d2=+dS[1],m1=+mS[0],m2=+mS[1],y1=+yS[0],y2=+yS[1],y3=+yS[2],y4=+yS[3];
    const dateArr=[d1,d2,m1,m2,y1,y2,y3,y4];
    const PDch=dateArr.reduce((a,b)=>a+b,0);
    const VDch=sd(PDch);
    let CHS=VDch===11?11:VDch;if(CHS!==11)while(CHS>9)CHS=sd(CHS);
    const divisor=d1!==0?d1:d2;
    const tdRaw=PDch-2*divisor;const TDch=Math.abs(tdRaw);
    const ChDch=TDch<10?TDch:sd(TDch);
    const pool=[...dateArr,...digs(PDch),...digs(VDch),...digs(TDch),...digs(ChDch)];
    const cnt={};for(let i=1;i<=9;i++)cnt[i]=0;pool.forEach(x=>{if(x>=1&&x<=9)cnt[x]++;});
    const R1=cnt[1]+cnt[4]+cnt[7],D1=cnt[1]+cnt[5]+cnt[9],R2=cnt[2]+cnt[5]+cnt[8],R3=cnt[3]+cnt[6]+cnt[9],C2=cnt[4]+cnt[5]+cnt[6],TMP=cnt[3]+cnt[5]+cnt[7];

    function oc(label,val,sub){
      let inner=val===0&&(!sub||sub===0)?`<span class="mq-empty">✦</span>`
                :(sub&&sub>0&&val>0)?`<span class="mq-num">${val}<small>(${sub})</small></span>`
                :`<span class="mq-num">${val>0?val:sub}</span>`;
      return `<td class="mq-outer"><span class="mq-lab">${label}</span>${inner}</td>`;
    }

    document.getElementById('mqmat').innerHTML=`
      <tr>
        <td colspan="2" class="mq-dopch"><span class="mq-lab">доп. числа</span><span class="mq-num">${PDch}, ${VDch}, ${TDch}, ${ChDch}</span></td>
        <td class="mq-chs"><span class="mq-lab">Число судьбы</span><span class="mq-num">${CHS}</span></td>
        <td class="mq-temp"><span class="mq-lab">Темперамент</span>${TMP>0?`<span class="mq-num">${TMP}</span>`:`<span class="mq-empty">✦</span>`}</td>
      </tr>
      <tr>${cell(1,cnt)}${cell(4,cnt)}${cell(7,cnt)}${oc('Цель',R1,D1)}</tr>
      <tr>${cell(2,cnt)}${cell(5,cnt)}${cell(8,cnt)}${oc('Семья',R2,null)}</tr>
      <tr>${cell(3,cnt)}${cell(6,cnt)}${cell(9,cnt)}${oc('Привычки',R3,null)}</tr>
      <tr><td class="mq-blank"></td>${oc('Быт',C2,null)}<td class="mq-blank"></td><td class="mq-blank"></td></tr>`;

    document.getElementById('mqout').style.display='block';
  };

  // Поля даты: только цифры, авто-переход при заполнении поля, Enter/«Ввод» с экранной клавиатуры — тоже переход
  const mqd=document.getElementById('mqd'),mqm=document.getElementById('mqm'),mqy=document.getElementById('mqy');
  function setupDateField(el,maxLen,next){
    el.addEventListener('input',function(){
      const v=el.value.replace(/[^0-9]/g,'').slice(0,maxLen);
      el.value=v;
      if(v.length===maxLen&&next) next.focus();
    });
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        e.preventDefault();
        if(next) next.focus(); else window.mqCalc();
      }
    });
  }
  setupDateField(mqd,2,mqm);
  setupDateField(mqm,2,mqy);
  setupDateField(mqy,4,null);

  // Ширина карточки всегда подгоняется под ширину надписи "SATOMI NUMERO" — на любом устройстве.
  // Если заголовок не помещается по ширине экрана, его размер уменьшается, пока не впишется.
  function measureTextWidth(el,text){
    const span=document.createElement('span');
    const cs=getComputedStyle(el);
    span.style.position='absolute';
    span.style.visibility='hidden';
    span.style.whiteSpace='nowrap';
    span.style.fontFamily=cs.fontFamily;
    span.style.fontSize=cs.fontSize;
    span.style.fontWeight=cs.fontWeight;
    span.style.letterSpacing=cs.letterSpacing;
    span.textContent=text;
    document.body.appendChild(span);
    const w=span.offsetWidth;
    document.body.removeChild(span);
    return w;
  }

  const MQ_BASE_TITLE_SIZE=30;
  function mqFitWidth(){
    const mq=document.querySelector('.mq');
    const h1=document.querySelector('.mq-h1');
    if(!mq||!h1) return;
    const cs=getComputedStyle(mq);
    const padL=parseFloat(cs.paddingLeft)||0;
    const padR=parseFloat(cs.paddingRight)||0;
    const maxContainerW=Math.floor(window.innerWidth*0.94);
    const maxTitleW=Math.max(160,maxContainerW-padL-padR);

    h1.style.fontSize=MQ_BASE_TITLE_SIZE+'px';
    let titleW=measureTextWidth(h1,h1.textContent);
    if(titleW>maxTitleW){
      const scale=maxTitleW/titleW;
      const newSize=Math.max(15,Math.floor(MQ_BASE_TITLE_SIZE*scale));
      h1.style.fontSize=newSize+'px';
      titleW=measureTextWidth(h1,h1.textContent);
    }
    const total=Math.ceil(titleW+padL+padR);
    mq.style.width=Math.min(total,maxContainerW)+'px';
    mq.style.maxWidth='100%';
  }
  window.addEventListener('load',mqFitWidth);
  window.addEventListener('resize',mqFitWidth);
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(mqFitWidth);}
  mqFitWidth();
})();
</script>
