
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400;500;600&family=Cinzel:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
.mq{
  --mq-bg:#0F0D1A;
  --mq-text:#E8DCC0;
  --mq-border:#2A2438;
  --mq-accent-muted:#7A6642;
  --mq-text-soft:#8A7859;
  --mq-panel:#1A1526;
  --mq-placeholder:#3A3346;
  --mq-gold:#C9A961;
  --mq-gold-bright:#F5D98A;
  --mq-cell-fill:#221B33;
  --mq-hero-fill:#3D2E1A;
  --mq-text-faint:#5A4E38;
  --mq-btn-bg:#F5F0E4;
  --mq-btn-text:#0F0D1A;
  --mq-error:#E17B7B;
  background:var(--mq-bg);color:var(--mq-text);padding:2rem 1.25rem;border-radius:4px;font-family:'Inter',sans-serif;border:0.5px solid var(--mq-border);position:relative;overflow:hidden;max-width:380px;width:100%;margin:0 auto;box-sizing:border-box;
  transition:background-color .4s ease, color .4s ease, border-color .4s ease;
}
.mq.mq-light{
  --mq-bg:#F7F1E3;
  --mq-text:#2C2418;
  --mq-border:#DDD0AE;
  --mq-accent-muted:#6E5730;
  --mq-text-soft:#6B5636;
  --mq-panel:#EFE6D0;
  --mq-placeholder:#C9BC9C;
  --mq-gold:#A8823F;
  --mq-gold-bright:#8C6A2E;
  --mq-cell-fill:#E9DEC0;
  --mq-hero-fill:#F0E2B8;
  --mq-text-faint:#7A6845;
  --mq-btn-bg:#2C2418;
  --mq-btn-text:#F7F1E3;
  --mq-error:#C24545;
}
.mq-corner{position:absolute;width:36px;height:36px;border:0.5px solid var(--mq-accent-muted);opacity:.5}
.mq-corner.tl{top:14px;left:14px;border-right:none;border-bottom:none}
.mq-corner.tr{top:14px;right:14px;border-left:none;border-bottom:none}
.mq-corner.bl{bottom:14px;left:14px;border-right:none;border-top:none}
.mq-corner.br{bottom:14px;right:14px;border-left:none;border-top:none}
.mq *:not(.mq-corner){position:relative}

.mq-theme-row{display:flex;justify-content:flex-end;margin-bottom:.75rem;padding-right:6px;padding-top:2px}
.mq-theme-toggle{position:relative;width:44px;height:24px;border-radius:999px;background:var(--mq-panel);border:0.5px solid var(--mq-border);cursor:pointer;padding:0;flex-shrink:0;opacity:.55;transition:background-color .4s ease,border-color .4s ease,opacity .2s ease}
.mq-theme-toggle:hover{border-color:var(--mq-gold);opacity:1}
.mq-theme-toggle:focus-visible{opacity:1;outline:2px solid var(--mq-gold);outline-offset:2px}
.mq-theme-toggle .mq-theme-thumb{position:absolute;top:2.5px;left:3px;width:18px;height:18px;border-radius:50%;background:var(--mq-gold);display:flex;align-items:center;justify-content:center;transition:transform .35s cubic-bezier(.4,0,.2,1),background-color .4s ease}
.mq-theme-toggle[aria-pressed="true"] .mq-theme-thumb{transform:translateX(19px)}
.mq-theme-toggle .mq-theme-icon{position:absolute;inset:0;margin:auto;width:12px;height:12px;color:var(--mq-bg);transition:opacity .25s ease}
.mq-icon-sun{opacity:0}
.mq-icon-moon{opacity:1}
.mq-theme-toggle[aria-pressed="true"] .mq-icon-sun{opacity:1}
.mq-theme-toggle[aria-pressed="true"] .mq-icon-moon{opacity:0}

.mq-eyebrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem}
.mq-eyebrow-num{font-family:'Cinzel',serif;font-weight:500;font-size:13px;letter-spacing:.1em;color:var(--mq-gold)}
.mq-eyebrow-txt{font-family:'Cinzel',serif;font-weight:400;font-size:10px;letter-spacing:.4em;color:var(--mq-gold);padding-left:.5em}
.mq-eyebrow-sep{width:0.5px;height:12px;background:var(--mq-accent-muted)}
.mq-orn{text-align:center;color:var(--mq-accent-muted);font-size:14px;margin-bottom:1rem;letter-spacing:.4em}
.mq-h1{font-family:'Cinzel',serif;font-weight:500;font-size:30px;line-height:1;text-align:center;color:var(--mq-text);margin-bottom:.6rem;letter-spacing:.1em;white-space:nowrap}
.mq-sub{font-family:'Cormorant',serif;font-style:italic;font-size:13px;text-align:center;color:var(--mq-text-soft);margin-bottom:1.5rem;letter-spacing:.05em}

.mq-form{background:var(--mq-panel);border:0.5px solid var(--mq-border);padding:1rem;border-radius:2px;margin-bottom:1.5rem;display:flex;flex-direction:column;align-items:center;gap:10px;overflow:hidden;transition:opacity .55s cubic-bezier(.4,0,.2,1), max-height .65s cubic-bezier(.4,0,.2,1), margin-bottom .65s cubic-bezier(.4,0,.2,1), padding .65s cubic-bezier(.4,0,.2,1), background-color .4s ease, border-color .4s ease}
.mq-form.mq-leaving{opacity:0;max-height:0!important;margin-bottom:0!important;padding-top:0!important;padding-bottom:0!important;pointer-events:none}
.mq-date-label{font-family:'Cormorant',serif;font-style:italic;font-size:14px;color:var(--mq-text-soft);text-align:center;letter-spacing:.03em}
.mq-date-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;width:100%}
.mq-in{background:transparent;border:none;border-bottom:0.5px solid var(--mq-gold);font-family:'Cormorant',serif;font-size:26px;font-weight:500;color:var(--mq-text);text-align:center;padding:2px 0;outline:none}
.mq-in::placeholder{color:var(--mq-placeholder)}
.mq-in:focus{border-color:var(--mq-text)}
.mq-dot{font-family:'Cormorant',serif;font-size:22px;color:var(--mq-accent-muted)}
.mq-btn{background:var(--mq-btn-bg);color:var(--mq-btn-text);border:0.5px solid var(--mq-btn-bg);padding:10px 26px;font-family:'Cinzel',serif;font-weight:500;font-size:11px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%}
.mq-btn:hover{background:var(--mq-gold);border-color:var(--mq-gold);color:var(--mq-btn-text)}
.mq-btn:focus-visible{outline:2px solid var(--mq-gold);outline-offset:2px}

.mq-err{color:var(--mq-error);font-family:'Cormorant',serif;font-style:italic;font-size:14px;text-align:center;max-height:0;overflow:hidden;margin-bottom:0;transition:max-height .3s cubic-bezier(.4,0,.2,1), margin .3s cubic-bezier(.4,0,.2,1)}
.mq-err.mq-err-show{max-height:3em;margin-bottom:.5rem}

.mq-sec{text-align:center;margin-bottom:1.25rem;position:relative}
.mq-sec-t{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.4em;color:var(--mq-gold);display:inline-block;background:var(--mq-bg);padding:0 16px;position:relative;z-index:1;transition:background-color .4s ease}
.mq-sec::before{content:'';position:absolute;top:50%;left:0;right:0;height:0.5px;background:var(--mq-border);z-index:0}

.mq-mat{background:var(--mq-panel);border:0.5px solid var(--mq-border);border-radius:2px;overflow:hidden;margin-bottom:1rem;transition:background-color .4s ease,border-color .4s ease}
.mq-mat table{width:100%;border-collapse:collapse;table-layout:fixed}
.mq-mat td{border:0.5px solid var(--mq-border);padding:12px 4px;text-align:center;vertical-align:middle}
.mq-mat tr:first-child td{border-top:none}
.mq-mat tr:last-child td{border-bottom:none}
.mq-mat td:first-child{border-left:none}
.mq-mat td:last-child{border-right:none}
.mq-mat td.mq-piece{transition:transform .6s cubic-bezier(.4,0,.2,1), opacity .55s cubic-bezier(.4,0,.2,1);transition-delay:var(--pd,0ms)}
.mq-mat td.mq-piece.mq-piece-in{opacity:0;transform:translate(var(--px,0px),var(--py,0px)) rotate(var(--pr,0deg)) scale(.8)}
.mq-lab{font-family:'Cinzel',serif;font-size:8px;color:var(--mq-accent-muted);letter-spacing:.2em;text-transform:uppercase;display:block;margin-bottom:6px;overflow-wrap:break-word;word-break:break-word}
.mq-num{font-family:'Cormorant',serif;font-weight:500;font-size:22px;color:var(--mq-text);letter-spacing:2px;display:block;line-height:1}
.mq-empty{font-family:'Cormorant',serif;font-style:italic;font-size:22px;color:var(--mq-placeholder);display:block;line-height:1}
.mq-full{background:var(--mq-cell-fill)}
.mq-full .mq-num{color:var(--mq-text)}

.mq-dopch{background:var(--mq-cell-fill);padding:14px 16px!important}
.mq-dopch .mq-num{font-size:15px;letter-spacing:1px;color:var(--mq-gold)}
.mq-chs{background:var(--mq-hero-fill);box-shadow:inset 0 0 0 0.5px var(--mq-gold)}
.mq-chs .mq-lab{color:var(--mq-gold)}
.mq-chs .mq-num{color:var(--mq-gold-bright);font-size:30px;font-weight:600}
.mq-temp{background:var(--mq-cell-fill)}
.mq-temp .mq-lab{letter-spacing:0;font-size:8.5px}
.mq-temp .mq-num{color:var(--mq-gold)}
.mq-outer{background:var(--mq-cell-fill)}
.mq-outer .mq-num{color:var(--mq-gold)}
.mq-outer .mq-num small{font-family:'Cormorant',serif;font-size:15px;color:var(--mq-accent-muted);margin-left:3px;letter-spacing:0}
.mq-blank{background:transparent}

.mq-foot{text-align:center;font-family:'Cormorant',serif;font-style:italic;color:var(--mq-text-faint);font-size:13px;margin-top:1.5rem;letter-spacing:.05em}

.mq-share{display:flex;gap:10px;justify-content:center;margin-top:1.25rem;flex-wrap:wrap}
.mq-share-btn{background:transparent;color:var(--mq-gold);border:0.5px solid var(--mq-accent-muted);padding:9px 18px;font-family:'Cinzel',serif;font-weight:500;font-size:10px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-radius:2px}
.mq-share-btn:hover{background:var(--mq-cell-fill);border-color:var(--mq-gold);color:var(--mq-gold-bright)}
.mq-share-btn:focus-visible{outline:2px solid var(--mq-gold);outline-offset:2px}
.mq-share-btn:disabled{opacity:.5;cursor:default}
.mq-share-hint{text-align:center;font-family:'Cormorant',serif;font-style:italic;font-size:12px;color:var(--mq-accent-muted);margin-top:.7rem;min-height:16px}

#mqout{transition:opacity .5s cubic-bezier(.4,0,.2,1), max-height .6s cubic-bezier(.4,0,.2,1);overflow:hidden}
#mqout.mq-closed{opacity:0}
#mqout.mq-open{opacity:1}

.mq-fly{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;font-family:'Cinzel',serif;font-weight:500;letter-spacing:.3em;color:var(--mq-gold);font-size:11px;text-transform:uppercase;white-space:nowrap;transition:transform .95s cubic-bezier(.4,0,.2,1), opacity .5s ease .4s}
</style>

<div class="mq">
  <div class="mq-corner tl"></div><div class="mq-corner tr"></div>
  <div class="mq-corner bl"></div><div class="mq-corner br"></div>

  <div class="mq-theme-row">
    <button id="mqThemeToggle" class="mq-theme-toggle" type="button" aria-label="Светлая тема" aria-pressed="false">
      <span class="mq-theme-thumb">
        <svg class="mq-theme-icon mq-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M5 5l1.4 1.4M17.6 17.6L19 19M3 12h2M19 12h2M5 19l1.4-1.4M17.6 6.4L19 5"/></svg>
        <svg class="mq-theme-icon mq-icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.7 14.9A8.6 8.6 0 1 1 9.1 3.3a7 7 0 0 0 11.6 11.6z"/></svg>
      </span>
    </button>
  </div>

  <div class="mq-eyebrow">
    <span class="mq-eyebrow-num">15</span>
    <span class="mq-eyebrow-sep"></span>
    <span class="mq-eyebrow-txt">MYSTERIUM</span>
  </div>
  <div class="mq-orn">✦ · · · ✦ · · · ✦</div>
  <div class="mq-h1">SATOMI NUMERO</div>
  <div class="mq-sub">— code of the soul, written at birth —</div>

  <div class="mq-form">
    <div class="mq-date-label">Ваша дата рождения</div>
    <div class="mq-date-row">
      <input id="mqd" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ДД" maxlength="2" style="width:42px">
      <span class="mq-dot">·</span>
      <input id="mqm" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ММ" maxlength="2" style="width:42px">
      <span class="mq-dot">·</span>
      <input id="mqy" class="mq-in" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="ГГГГ" maxlength="4" style="width:70px">
    </div>
    <button class="mq-btn" onclick="mqCalc({animate:true})">Раскрыть</button>
  </div>

  <div class="mq-err" id="mqerr"></div>

  <div id="mqout" style="display:none">
    <div class="mq-sec"><span class="mq-sec-t" id="mqSecT"></span></div>
    <div class="mq-mat"><table id="mqmat"></table></div>
    <div class="mq-share">
      <button class="mq-share-btn" id="mqShareBtn" type="button">Поделиться</button>
      <button class="mq-share-btn" id="mqLinkBtn" type="button">Скопировать ссылку</button>
      <button class="mq-share-btn" id="mqResetBtn" type="button">Другая дата</button>
    </div>
    <div class="mq-share-hint" id="mqShareHint"></div>
    <div class="mq-foot">✦ ex numeris veritas ✦</div>
  </div>
</div>

<script>
(function(){
  // Подстраховка: если хост-страница вставляет этот код в <body> и своего viewport-тега у неё нет,
  // добавляем его через JS — иначе на телефоне вся страница рендерится уменьшенной.
  if(!document.querySelector('meta[name="viewport"]')){
    const vp=document.createElement('meta');
    vp.name='viewport';
    vp.content='width=device-width, initial-scale=1';
    document.head.appendChild(vp);
  }

  const mqRoot=document.querySelector('.mq');

  // --- Тёмная/светлая тема: переключатель с солнцем/луной, выбор запоминается ---
  const mqThemeToggle=document.getElementById('mqThemeToggle');
  function mqApplyTheme(light){
    mqRoot.classList.toggle('mq-light',light);
    mqThemeToggle.setAttribute('aria-pressed',light?'true':'false');
    mqThemeToggle.setAttribute('aria-label',light?'Тёмная тема':'Светлая тема');
    try{localStorage.setItem('mq-theme',light?'light':'dark');}catch(e){}
  }
  let mqStoredLight=false;
  try{mqStoredLight=localStorage.getItem('mq-theme')==='light';}catch(e){}
  mqApplyTheme(mqStoredLight);
  mqThemeToggle.addEventListener('click',function(){
    mqApplyTheme(!mqRoot.classList.contains('mq-light'));
  });

  // Тайминги анимации раскрытия/сворачивания — должны совпадать с длительностями
  // transition в CSS: .mq-form (opacity .55s / max-height .65s), #mqout (opacity .5s / max-height .6s),
  // .mq-fly (transform .95s). Меняешь скорость в CSS — поправь и здесь.
  const MQ_T={
    formCollapse:650,
    matrixStart:600,
    matrixSettle:650,
    ghostFly:950,
    matrixCollapse:600
  };

  // Границы дня/месяца и единственный источник истины для проверки даты —
  // используется и «живой» подрезкой полей, и финальным расчётом.
  const MQ_DAY_MIN=1, MQ_DAY_MAX=31, MQ_MONTH_MIN=1, MQ_MONTH_MAX=12;
  function mqValidateDate(d,m,y){
    if(!d||!m||!y) return {ok:false,msg:'заполните дату полностью'};
    if(y>new Date().getFullYear()) return {ok:false,msg:'проверьте год рождения'};
    if(m<MQ_MONTH_MIN||m>MQ_MONTH_MAX) return {ok:false,msg:'месяц должен быть от 01 до 12'};
    const daysInMonth=new Date(y,m,0).getDate();
    if(d<MQ_DAY_MIN||d>daysInMonth) return {ok:false,msg:`в этом месяце ${daysInMonth} дней`};
    return {ok:true,d,m,y};
  }

  const DN_RU={1:'Характер',2:'Энергия',3:'Интерес',4:'Здоровье',5:'Логика',6:'Труд',7:'Удача',8:'Долг',9:'Память'};
  const digs=n=>Math.abs(n).toString().split('').map(Number);
  const sd=n=>digs(n).reduce((a,b)=>a+b,0);

  function cell(d,cnt){
    const n=cnt[d];
    const val=n===0?null:d.toString().repeat(n);
    const cls=n>0?'mq-full':'';
    return `<td class="${cls}"><span class="mq-lab">${DN_RU[d]}</span>${val?`<span class="mq-num">${val}</span>`:`<span class="mq-empty">✦</span>`}</td>`;
  }

  window.mqCalc=function(opts){
    const reducedMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const animate=!!(opts&&opts.animate)&&!reducedMotion;
    const err=document.getElementById('mqerr');
    err.textContent='';
    err.classList.remove('mq-err-show');
    const outEl=document.getElementById('mqout');
    const d=+document.getElementById('mqd').value||0;
    const m=+document.getElementById('mqm').value||0;
    const y=+document.getElementById('mqy').value||0;

    function fail(msg){
      err.textContent=msg;
      err.classList.add('mq-err-show');
      outEl.style.display='none';
      outEl.classList.remove('mq-open','mq-closed');
      return false;
    }

    const check=mqValidateDate(d,m,y);
    if(!check.ok) return fail(check.msg);

    const dS=d.toString().padStart(2,'0'),mS=m.toString().padStart(2,'0'),yS=y.toString().padStart(4,'0');
    const d1=+dS[0],d2=+dS[1],m1=+mS[0],m2=+mS[1],y1=+yS[0],y2=+yS[1],y3=+yS[2],y4=+yS[3];
    const dateArr=[d1,d2,m1,m2,y1,y2,y3,y4];
    const PDch=dateArr.reduce((a,b)=>a+b,0);
    const VDch=sd(PDch);
    let CHS=VDch===11?11:VDch;if(CHS!==11)while(CHS>9)CHS=sd(CHS);
    const divisor=d1!==0?d1:d2;
    const tdRaw=PDch-2*divisor;const TDch=Math.abs(tdRaw);
    const ChDch=TDch<10?TDch:sd(TDch);
    const pool=[...dateArr,...digs(PDch),...digs(VDch),...digs(TDch),...digs(ChDch)];
    const cnt={};for(let i=1;i<=9;i++)cnt[i]=0;pool.forEach(x=>{if(x>=1&&x<=9)cnt[x]++;});
    const R1=cnt[1]+cnt[4]+cnt[7],D1=cnt[1]+cnt[5]+cnt[9],R2=cnt[2]+cnt[5]+cnt[8],R3=cnt[3]+cnt[6]+cnt[9],C2=cnt[4]+cnt[5]+cnt[6],TMP=cnt[3]+cnt[5]+cnt[7];

    function oc(label,val,sub){
      let inner=val===0&&(!sub||sub===0)?`<span class="mq-empty">✦</span>`
                :(sub&&sub>0&&val>0)?`<span class="mq-num">${val}<small>(${sub})</small></span>`
                :`<span class="mq-num">${val>0?val:sub}</span>`;
      return `<td class="mq-outer"><span class="mq-lab">${label}</span>${inner}</td>`;
    }

    const dateLabel=dS+' · '+mS+' · '+yS;
    document.getElementById('mqSecT').textContent=dateLabel;

    document.getElementById('mqmat').innerHTML=`
      <tr>
        <td colspan="2" class="mq-dopch"><span class="mq-lab">доп. числа</span><span class="mq-num">${PDch}, ${VDch}, ${TDch}, ${ChDch}</span></td>
        <td class="mq-chs"><span class="mq-lab">Число судьбы</span><span class="mq-num">${CHS}</span></td>
        <td class="mq-temp"><span class="mq-lab">Темперамент</span>${TMP>0?`<span class="mq-num">${TMP}</span>`:`<span class="mq-empty">✦</span>`}</td>
      </tr>
      <tr>${cell(1,cnt)}${cell(4,cnt)}${cell(7,cnt)}${oc('Цель',R1,D1)}</tr>
      <tr>${cell(2,cnt)}${cell(5,cnt)}${cell(8,cnt)}${oc('Семья',R2,null)}</tr>
      <tr>${cell(3,cnt)}${cell(6,cnt)}${cell(9,cnt)}${oc('Привычки',R3,null)}</tr>
      <tr><td class="mq-blank"></td>${oc('Быт',C2,null)}<td class="mq-blank"></td><td class="mq-blank"></td></tr>`;

    if(animate){
      mqAnimateReveal(dateLabel);
    }else{
      outEl.style.display='block';
      outEl.classList.remove('mq-closed');
      outEl.classList.add('mq-open');
    }
    return true;
  };

  // Анимация раскрытия: дата «улетает» на место подписи, форма ввода сворачивается и исчезает,
  // а матрица разворачивается на освободившемся месте.
  function mqAnimateReveal(dateLabel){
    const form=document.querySelector('.mq-form');
    const dateRow=document.querySelector('.mq-date-row');
    const outEl=document.getElementById('mqout');

    // позиции считаем ДО того как форма схлопнется
    const rowRect=dateRow.getBoundingClientRect();
    const formRect=form.getBoundingClientRect();
    const targetY=formRect.top+16;

    const ghost=document.createElement('div');
    ghost.className='mq-fly';
    ghost.textContent=dateLabel;
    mqRoot.appendChild(ghost);
    const gRect=ghost.getBoundingClientRect();
    const startLeft=rowRect.left+rowRect.width/2-gRect.width/2;
    const startTop=rowRect.top+rowRect.height/2-gRect.height/2;
    ghost.style.left=startLeft+'px';
    ghost.style.top=startTop+'px';
    void ghost.offsetHeight;
    requestAnimationFrame(()=>{
      ghost.style.transform=`translateY(${targetY-startTop-gRect.height/2}px) scale(.85)`;
      ghost.style.opacity='0';
    });
    setTimeout(()=>{ghost.remove();},MQ_T.ghostFly+50);

    form.style.maxHeight=form.scrollHeight+'px';
    void form.offsetHeight;
    requestAnimationFrame(()=>{form.classList.add('mq-leaving');});
    setTimeout(()=>{form.style.display='none';},MQ_T.formCollapse+50);

    setTimeout(()=>{
      mqPreparePuzzleCells();
      outEl.classList.add('mq-closed');
      outEl.style.display='block';
      outEl.style.maxHeight='0px';
      void outEl.offsetHeight;
      const naturalHeight=outEl.scrollHeight;
      requestAnimationFrame(()=>{
        outEl.classList.remove('mq-closed');
        outEl.classList.add('mq-open');
        outEl.style.maxHeight=naturalHeight+'px';
        mqSettlePuzzleCells();
      });
      setTimeout(()=>{outEl.style.maxHeight='none';},MQ_T.matrixSettle);
    },MQ_T.matrixStart);
  }

  // Обратный переход: матрица сворачивается, форма возвращается на своё место.
  // Введённая дата не сбрасывается — фокус ставится на поле дня.
  function mqAnimateReset(){
    const form=document.querySelector('.mq-form');
    const outEl=document.getElementById('mqout');
    const reducedMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function clearDateFields(){
      mqd.value='';
      mqm.value='';
      mqy.value='';
    }

    function showFormInstant(){
      form.classList.remove('mq-leaving');
      form.style.display='flex';
      form.style.opacity='';
      form.style.maxHeight='';
      clearDateFields();
      document.getElementById('mqd').focus();
    }

    if(reducedMotion){
      outEl.style.display='none';
      outEl.classList.remove('mq-open','mq-closed');
      outEl.style.maxHeight='';
      showFormInstant();
      return;
    }

    // 1. сворачиваем матрицу (нужна конкретная стартовая высота — от 'none' плавно не перейти)
    outEl.style.maxHeight=outEl.scrollHeight+'px';
    void outEl.offsetHeight;
    requestAnimationFrame(()=>{
      outEl.classList.remove('mq-open');
      outEl.classList.add('mq-closed');
      outEl.style.maxHeight='0px';
    });

    setTimeout(()=>{
      outEl.style.display='none';
      outEl.classList.remove('mq-closed');
      outEl.style.maxHeight='';

      // 2. плавно возвращаем форму (padding/margin уже на своих местах — они не анимируются,
      // при нулевой высоте и overflow:hidden их мгновенный возврат не виден)
      form.classList.remove('mq-leaving');
      form.style.display='flex';
      form.style.opacity='0';
      form.style.maxHeight='0px';
      clearDateFields();
      void form.offsetHeight;
      const naturalFormHeight=form.scrollHeight;
      requestAnimationFrame(()=>{
        form.style.opacity='1';
        form.style.maxHeight=naturalFormHeight+'px';
      });
      setTimeout(()=>{
        form.style.maxHeight='';
        form.style.opacity='';
        document.getElementById('mqd').focus();
      },MQ_T.formCollapse);
    },MQ_T.matrixCollapse);
  }

  // Клетки матрицы стартуют смещёнными от центра (как разлетевшиеся кусочки пазла)
  // и с небольшой волной по времени складываются на свои места.
  function mqPreparePuzzleCells(){
    let i=0;
    document.querySelectorAll('#mqmat tr').forEach((tr,rIdx)=>{
      const cells=tr.querySelectorAll('td');
      const n=cells.length;
      cells.forEach((td,cIdx)=>{
        const dx=(cIdx-(n-1)/2)*28;
        const dy=(rIdx-2)*24;
        const rot=(i%2===0?-1:1)*(5+(i%3)*3);
        const delay=i*28;
        td.style.setProperty('--px',dx.toFixed(1)+'px');
        td.style.setProperty('--py',dy.toFixed(1)+'px');
        td.style.setProperty('--pr',rot+'deg');
        td.style.setProperty('--pd',delay+'ms');
        td.classList.add('mq-piece','mq-piece-in');
        i++;
      });
    });
  }
  function mqSettlePuzzleCells(){
    document.querySelectorAll('#mqmat td.mq-piece-in').forEach(td=>td.classList.remove('mq-piece-in'));
  }

  // Поля даты: только цифры, авто-переход при заполнении поля, Enter/«Ввод» с экранной клавиатуры — тоже переход
  const mqd=document.getElementById('mqd'),mqm=document.getElementById('mqm'),mqy=document.getElementById('mqy');
  function setupDateField(el,maxLen,next,min,max){
    el.addEventListener('input',function(){
      let v=el.value.replace(/[^0-9]/g,'').slice(0,maxLen);
      if(v.length===maxLen&&(min!=null||max!=null)){
        let n=parseInt(v,10);
        if(min!=null&&n<min) n=min;
        if(max!=null&&n>max) n=max;
        v=String(n).padStart(maxLen,'0');
      }
      el.value=v;
      if(v.length===maxLen&&next) next.focus();
    });
    el.addEventListener('keydown',function(e){
      if(e.key==='Enter'){
        e.preventDefault();
        if(next) next.focus(); else window.mqCalc({animate:true});
      }
    });
  }
  setupDateField(mqd,2,mqm,MQ_DAY_MIN,MQ_DAY_MAX);
  setupDateField(mqm,2,mqy,MQ_MONTH_MIN,MQ_MONTH_MAX);
  setupDateField(mqy,4,null);

  // --- Ссылка на результат: ?d=ДД&m=ММ&y=ГГГГ ---
  function mqBuildLink(){
    if(!mqd.value||!mqm.value||!mqy.value) return null;
    const url=new URL(window.location.href);
    url.search='';
    url.searchParams.set('d',mqd.value);
    url.searchParams.set('m',mqm.value);
    url.searchParams.set('y',mqy.value);
    return url.toString();
  }

  function mqParseUrlDate(){
    const params=new URLSearchParams(window.location.search);
    const rawD=params.get('d'),rawM=params.get('m'),rawY=params.get('y');
    if(!rawD||!rawM||!rawY) return;
    const d=+rawD.replace(/[^0-9]/g,'').slice(0,2)||0;
    const m=+rawM.replace(/[^0-9]/g,'').slice(0,2)||0;
    const y=+rawY.replace(/[^0-9]/g,'').slice(0,4)||0;
    if(!mqValidateDate(d,m,y).ok) return; // невалидные параметры — молча оставляем пустую форму
    mqd.value=String(d).padStart(2,'0');
    mqm.value=String(m).padStart(2,'0');
    mqy.value=String(y).padStart(4,'0');
    window.mqCalc();
  }

  const mqShareHint=document.getElementById('mqShareHint');

  document.getElementById('mqLinkBtn').addEventListener('click',async function(){
    const link=mqBuildLink();
    if(!link){mqShareHint.textContent='Сначала введите дату';return;}
    try{
      await navigator.clipboard.writeText(link);
      mqShareHint.textContent='Ссылка скопирована';
    }catch(e){
      window.prompt('Скопируйте ссылку:',link);
    }
  });

  document.getElementById('mqResetBtn').addEventListener('click',function(){
    mqAnimateReset();
  });

  // --- Поделиться картинкой (html2canvas + Web Share API, с фолбэком на скачивание) ---
  let mqH2CPromise=null;
  function loadHtml2Canvas(){
    if(mqH2CPromise) return mqH2CPromise;
    mqH2CPromise=new Promise((resolve,reject)=>{
      if(window.html2canvas){resolve(window.html2canvas);return;}
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=()=>resolve(window.html2canvas);
      s.onerror=()=>reject(new Error('load failed'));
      document.head.appendChild(s);
    });
    return mqH2CPromise;
  }

  document.getElementById('mqShareBtn').addEventListener('click',async function(){
    const btn=this;
    const mq=mqRoot;
    const form=document.querySelector('.mq-form');
    const shareRow=document.querySelector('.mq-share');
    const themeRow=document.querySelector('.mq-theme-row');
    const err=document.getElementById('mqerr');
    btn.disabled=true;
    mqShareHint.textContent='Готовим изображение…';
    // на время рендера прячем форму ввода, кнопки и переключатель темы — на картинке они не нужны
    const prevForm=form.style.display,prevShare=shareRow.style.display,prevErr=err.style.display,prevTheme=themeRow.style.display;
    form.style.display='none';
    shareRow.style.display='none';
    err.style.display='none';
    themeRow.style.display='none';
    try{
      const html2canvas=await loadHtml2Canvas();
      if(document.fonts&&document.fonts.ready){ await document.fonts.ready; }
      const bgColor=getComputedStyle(mq).getPropertyValue('--mq-bg').trim()||'#0F0D1A';
      const canvas=await html2canvas(mq,{backgroundColor:bgColor,scale:3,ignoreElements:el=>el===mqShareHint});
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
      if(!blob) throw new Error('no blob');
      const file=new File([blob],'satomi-numero.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:'Satomi Numero'});
          mqShareHint.textContent='';
        }catch(shareErr){
          if(shareErr&&shareErr.name==='AbortError'){mqShareHint.textContent='';}
          else{throw shareErr;}
        }
      }else{
        const a=document.createElement('a');
        const objUrl=URL.createObjectURL(blob);
        a.href=objUrl;
        a.download='satomi-numero.png';
        a.click();
        setTimeout(()=>{URL.revokeObjectURL(objUrl);},0);
        mqShareHint.textContent='Изображение скачано — прикрепите его в мессенджер или письмо вручную';
      }
    }catch(e){
      mqShareHint.textContent='Не удалось создать изображение, попробуйте ещё раз';
    }finally{
      form.style.display=prevForm;
      shareRow.style.display=prevShare;
      err.style.display=prevErr;
      themeRow.style.display=prevTheme;
      btn.disabled=false;
    }
  });

  mqParseUrlDate();

  // Ширина карточки всегда подгоняется под ширину надписи "SATOMI NUMERO" — на любом устройстве.
  // Если заголовок не помещается по ширине экрана, его размер уменьшается, пока не впишется.
  function measureTextWidth(el,text){
    const span=document.createElement('span');
    const cs=getComputedStyle(el);
    span.style.position='absolute';
    span.style.visibility='hidden';
    span.style.whiteSpace='nowrap';
    span.style.fontFamily=cs.fontFamily;
    span.style.fontSize=cs.fontSize;
    span.style.fontWeight=cs.fontWeight;
    span.style.letterSpacing=cs.letterSpacing;
    span.textContent=text;
    document.body.appendChild(span);
    const w=span.offsetWidth;
    document.body.removeChild(span);
    return w;
  }

  const MQ_BASE_TITLE_SIZE=30;
  function mqFitWidth(){
    const mq=document.querySelector('.mq');
    const h1=document.querySelector('.mq-h1');
    if(!mq||!h1) return;
    const cs=getComputedStyle(mq);
    const padL=parseFloat(cs.paddingLeft)||0;
    const padR=parseFloat(cs.paddingRight)||0;
    const parentW=mq.parentElement?mq.parentElement.clientWidth:window.innerWidth;
    const maxContainerW=Math.floor((parentW||window.innerWidth)*0.94);
    const maxTitleW=Math.max(160,maxContainerW-padL-padR);

    h1.style.fontSize=MQ_BASE_TITLE_SIZE+'px';
    let titleW=measureTextWidth(h1,h1.textContent);
    if(titleW>maxTitleW){
      const scale=maxTitleW/titleW;
      const newSize=Math.max(15,Math.floor(MQ_BASE_TITLE_SIZE*scale));
      h1.style.fontSize=newSize+'px';
      titleW=measureTextWidth(h1,h1.textContent);
    }
    const total=Math.ceil(titleW+padL+padR);
    mq.style.width=Math.min(total,maxContainerW)+'px';
    mq.style.maxWidth='100%';
  }
  window.addEventListener('load',mqFitWidth);
  window.addEventListener('resize',mqFitWidth);
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(mqFitWidth);}
  mqFitWidth();
})();
</script>
